<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORSK DIGGER PROJECT | WIKI & MAP LINKED</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --y: #ffcc00; --b: #0a0a0a; --g: #1a1a1a; --text: #e0e0e0; --shadow: rgba(0,0,0,0.5); }
        [data-theme="bw"] { --y: #ffffff; --b: #000000; --text: #ffffff; }
        [data-theme="stalker"] { --y: #00ff41; --b: #001100; --g: #002200; --text: #00ff41; --shadow: rgba(0,255,65,0.2); }
        [data-theme="boykisser"] { --y: #ff80ab; --b: #fff0f6; --text: #880e4f; }

        body { background: var(--b); color: var(--text); font-family: 'Courier New', monospace; margin: 0; transition: 0.3s; }
        .container { max-width: 1000px; width: 95%; margin: 0 auto; padding-bottom: 50px; }
        header { background: var(--y); color: var(--b); padding: 40px 0; text-align: center; border-bottom: 5px solid #000; }
        .logo-img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid #000; cursor: pointer; object-fit: cover; }
        
        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 25px 0; }
        nav button, nav select { background: var(--g); border: 2px solid var(--y); color: var(--y); padding: 12px 18px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 14px; }
        nav button.active { background: var(--y); color: var(--b); }

        .page { display: none; min-height: 400px; }
        .page.active { display: block; }
        .card { background: var(--g); padding: 20px; border-left: 10px solid var(--y); margin-bottom: 15px; box-shadow: 5px 5px 15px var(--shadow); }
        
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--y); color: #fff; box-sizing: border-box; font-family: inherit; }
        .btn-send { background: var(--y); color: var(--b); border: none; padding: 20px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 2px solid var(--b); }

        #map-window { width: 100%; height: 500px; border: 4px solid var(--y); overflow: auto; position: relative; background: #000; }
        #map-area { position: relative; display: inline-block; }
        .marker { position: absolute; width: 20px; height: 20px; border: 2px solid #000; transform: translate(-50%, -50%) rotate(45deg); cursor: pointer; z-index: 10; }
        
        /* Цвета категорий */
        .cat-underground { background: #555 !important; }
        .cat-surface { background: #00ff41 !important; }
        .cat-loot { background: #ffcc00 !important; box-shadow: 0 0 10px #ffcc00; }
        .cat-guard { background: #ff0000 !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .xp-bar { width: 200px; height: 12px; background: #333; margin: 15px auto; border: 1px solid #000; position: relative; }
        #xp-fill { height: 100%; background: var(--b); width: 0%; transition: 0.5s; }
        footer { text-align: center; padding: 35px; border-top: 5px solid var(--y); margin-top: 50px; font-weight: 900; }
    </style>
</head>
<body>

<header>
    <img src="assets/logo.png" class="logo-img" onclick="playMeow()">
    <h1>ORSK DIGGER PROJECT</h1>
    <div class="xp-bar"><div id="xp-fill"></div></div>
    <div id="xp-val" style="font-weight:bold;">0 XP</div>
</header>

<div class="container">
    <nav>
        <button onclick="switchTab('map-page')" id="btn-map" class="active">КАРТА</button>
        <button onclick="switchTab('wiki-page')" id="btn-wiki">ВИКИ</button>
        <button onclick="switchTab('blog-page')" id="btn-blog">ОТЧЕТЫ</button>
        <button onclick="switchTab('forum-page')" id="btn-forum">ФОРУМ</button>
        <select onchange="changeTheme(this.value)">
            <option value="default">🌐 СТАНДАРТ</option>
            <option value="stalker">📟 ПНВ "ЗЕБРА"</option>
            <option value="bw">☢ МОНОХРОМ</option>
            <option value="boykisser">✿ BOYKISSER :3</option>
        </select>
    </nav>

    <!-- КАРТА -->
    <div id="map-page" class="page active">
        <div id="map-window">
            <div id="map-area">
                <img src="assets/maposn.jpg" id="map-img" onclick="addMarker(event)">
                <div id="markers-layer"></div>
            </div>
        </div>
    </div>

    <!-- ВИКИ -->
    <div id="wiki-page" class="page">
        <div class="card">
            <h3>📝 НОВЫЙ ОБЪЕКТ В БАЗУ</h3>
            <input type="text" id="wiki-title" placeholder="Название объекта...">
            <textarea id="wiki-desc" placeholder="Описание, история, как попасть..."></textarea>
            <button class="btn-send" onclick="sendWiki()">СОХРАНИТЬ В ВИКИ</button>
        </div>
        <input type="text" id="wiki-search" placeholder="Поиск по базе..." oninput="renderWiki()">
        <div id="wiki-list"></div>
    </div>

    <!-- ОТЧЕТЫ (БЫВШИЙ АРХИВ) -->
    <div id="blog-page" class="page">
        <div class="card">
            <h3>📸 ОПУБЛИКОВАТЬ ОТЧЕТ О ЗАЛАЗЕ</h3>
            <input type="text" id="post-t" placeholder="Где были?">
            <textarea id="post-b" placeholder="Как всё прошло? Охрана, хабар, впечатления..."></textarea>
            <button class="btn-send" onclick="sendPost()">ВЫЛОЖИТЬ ОТЧЕТ</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="forum-page" class="page">
        <div class="card"><textarea id="forum-m" placeholder="Чат..."></textarea><button class="btn-send" onclick="sendForum()">ОТПРАВИТЬ</button></div>
        <div id="forum-feed"></div>
    </div>

    <div id="profile-page" class="page">
        <div class="card"><h2 id="prof-nick">...</h2><p id="prof-rank">Загрузка...</p><button class="btn-send" onclick="resetData()" style="background:#500; color:#fff;">СБРОС ПРОФИЛЯ</button></div>
    </div>
</div>

<footer>КТО ЗАДУДОСИТ ЭТОТ САЙТ ТОТ ПИДОРАС</footer>

<script>
    const gun = Gun(['https://herokuapp.com', 'https://peer.ooo']);
    const db = gun.get('orsk_digger_ultra_v3');

    let user = { nick: localStorage.getItem('d_nick'), xp: parseInt(localStorage.getItem('d_xp') || "0") };
    let wikiData = {};

    window.onload = () => {
        if (!user.nick) {
            let n = prompt("ТВОЙ ПОЗЫВНОЙ:");
            if (n) { localStorage.setItem('d_nick', n.trim()); location.reload(); }
        } else {
            updateXP();
            initSync();
            changeTheme(localStorage.getItem('s_theme') || 'default');
        }
    };

    function updateXP() {
        localStorage.setItem('d_xp', user.xp);
        document.getElementById('xp-val').innerText = user.xp + " XP";
        document.getElementById('xp-fill').style.width = Math.min(user.xp, 100) + "%";
        document.getElementById('prof-nick').innerText = user.nick;
        const ranks = ["Школьник", "Крыса", "Лазальщик", "Диггер", "Легенда"];
        document.getElementById('prof-rank').innerText = "Ранг: " + (ranks[Math.min(Math.floor(user.xp/50), 4)]);
    }

    function initSync() {
        // Синхронизация Вики
        db.get('wiki').map().on((data, key) => {
            if(data) { wikiData[key] = data; renderWiki(); }
        });

        // Синхронизация Маркеров
        db.get('markers').map().on((data, id) => {
            if (!data || document.getElementById('m-'+id)) return;
            const m = document.createElement('div');
            m.id = 'm-'+id;
            m.className = `marker cat-${data.cat || 'surface'}`;
            m.style = `left:${data.x}%; top:${data.y}%;`;
            m.onclick = () => {
                if(confirm(`📍 ${data.n}\nПерейти к статье в Вики?`)) {
                    document.getElementById('wiki-search').value = data.n;
                    switchTab('wiki-page');
                    renderWiki();
                }
            };
            document.getElementById('markers-layer').appendChild(m);
        });

        // Синхронизация Отчетов
        db.get('posts').map().on((data, id) => {
            if (!data || document.getElementById('p-'+id)) return;
            const d = document.createElement('div');
            d.id = 'p-'+id; d.className = 'card';
            d.innerHTML = `<b>${data.nick}</b> <small>${data.date}</small><h3>${data.t}</h3><p>${data.b}</p>`;
            document.getElementById('feed').prepend(d);
        });

        // Форум
        db.get('forum').map().on((data, id) => {
            if (!data || document.getElementById('f-'+id)) return;
            const d = document.createElement('div');
            d.id = 'f-'+id; d.style = "border-bottom:1px solid #444; padding:10px;";
            d.innerHTML = `<b>${data.nick}</b>: ${data.m}`;
            document.getElementById('forum-feed').prepend(d);
        });
    }

    // --- ФУНКЦИИ ВИКИ ---
    function sendWiki() {
        const title = document.getElementById('wiki-title').value;
        const desc = document.getElementById('wiki-desc').value;
        if(!title || !desc) return;
        db.get('wiki').get(title).put({ title, desc, author: user.nick, date: new Date().toLocaleDateString() });
        user.xp += 20; updateXP();
        alert("Запись создана!");
        document.getElementById('wiki-title').value = ''; document.getElementById('wiki-desc').value = '';
    }

    function renderWiki() {
        const s = document.getElementById('wiki-search').value.toLowerCase();
        const container = document.getElementById('wiki-list');
        container.innerHTML = '';
        Object.values(wikiData).forEach(obj => {
            if(obj.title.toLowerCase().includes(s)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h2>${obj.title}</h2><p>${obj.desc}</p><small>Автор: ${obj.author}</small>`;
                container.prepend(card);
            }
        });
    }

    // --- КАРТА ---
    function addMarker(e) {
        const rect = e.target.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100, y = ((e.clientY - rect.top) / rect.height) * 100;
        const n = prompt("НАЗВАНИЕ ОБЪЕКТА:");
        if(!n) return;
        const cat = prompt("1.Подземка 2.Наземка 3.Хабар 4.Охрана");
        const cats = {"1":"underground","2":"surface","3":"loot","4":"guard"};
        
        db.get('markers').set({ x, y, n, cat: cats[cat] || "surface", nick: user.nick });
        // Создаем пустую статью в Вики сразу
        db.get('wiki').get(n).put({ title: n, desc: "Информации пока нет. Добавьте её!", author: "System" });
        user.xp += 10; updateXP();
    }

    // --- ОСТАЛЬНОЕ ---
    function sendPost() {
        const t = document.getElementById('post-t').value, b = document.getElementById('post-b').value;
        if(!t || !b) return;
        db.get('posts').set({ nick: user.nick, t, b, date: new Date().toLocaleString() });
        user.xp += 15; updateXP();
        document.getElementById('post-t').value = ''; document.getElementById('post-b').value = '';
    }

    function sendForum() {
        const m = document.getElementById('forum-m').value;
        if(!m) return;
        db.get('forum').set({ nick: user.nick, m });
        user.xp += 2; updateXP();
        document.getElementById('forum-m').value = '';
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const btnId = 'btn-' + id.split('-')[0];
        if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
    }

    function changeTheme(v) { document.documentElement.setAttribute('data-theme', v); localStorage.setItem('s_theme', v); }
    function resetData() { if(confirm("Сброс?")) { localStorage.clear(); location.reload(); } }
    function playMeow() { new Audio('https://myinstants.com').play().catch(()=>{}); }
</script>
</body>
</html>
