<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DIGGER NET | HOSTED</title>
    <style>
        :root { --bg: #000; --text: #0f0; --accent: #0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .nav { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .nav a:hover { background: var(--accent); color: var(--bg); }
        .page { display: none; }
        .active { display: block; }
        input, textarea, select { background: #000; border: 1px solid var(--accent); color: var(--text); padding: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .box { border: 1px solid var(--accent); padding: 15px; margin-top: 10px; background: rgba(0,255,0,0.05); }
        .msg { border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        .xp-bar { width: 100%; height: 10px; border: 1px solid var(--accent); margin-top: 5px; }
        #xp-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }
        body.old { --bg: #000; --text: #ffcc00; --accent: #ffcc00; }
        body.boykisser { --bg: #fff; --text: #ff69b4; --accent: #ffb6c1; }
        body.pnv { --bg: #001a00; --text: #00ff00; --accent: #005500; }
    </style>
</head>
<body class="classic">

<div class="nav">
    <a onclick="route('archive')">/Архив</a>
    <a onclick="route('forum')">/Форум</a>
    <a onclick="route('profile')">/Профиль</a>
    <a onclick="route('settings')">/Настройки</a>
</div>

<div id="archive" class="page active">
    <h2>> НОВЫЙ ОБЪЕКТ</h2>
    <div class="box">
        <input type="text" id="obj-title" placeholder="Название">
        <input type="text" id="obj-coords" placeholder="Координаты">
        <textarea id="obj-desc" placeholder="Описание..."></textarea>
        <button onclick="saveObject()">ОПУБЛИКОВАТЬ ДЛЯ ВСЕХ (+50 XP)</button>
    </div>
    <div id="archive-list"></div>
</div>

<div id="forum" class="page">
    <h2>> ГЛОБАЛЬНЫЙ ЧАТ</h2>
    <div id="chat-box" style="height: 350px; overflow-y: auto; border: 1px solid var(--accent); padding: 10px; margin-bottom: 10px;"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="chat-input" placeholder="Сообщение...">
        <button style="width: auto;" onclick="sendMessage()">SEND</button>
    </div>
</div>

<div id="profile" class="page">
    <h2>> ТЕРМИНАЛ</h2>
    <input type="text" id="nick-input" onchange="saveNick()" placeholder="Ваш ник">
    <div class="box">
        <p>УРОВЕНЬ: <span id="lvl">1</span> | ОПЫТ: <span id="xp">0</span></p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>
</div>

<div id="settings" class="page">
    <h2>> ТЕМЫ</h2>
    <select onchange="changeTheme(this.value)" id="theme-select">
        <option value="classic">Classic</option>
        <option value="old">Old</option>
        <option value="boykisser">Boykisser:3</option>
        <option value="pnv">ПНВ</option>
    </select>
</div>

<script>
    let state = {
        nick: localStorage.getItem('d_nick') || 'User' + Math.floor(Math.random()*99),
        xp: parseInt(localStorage.getItem('d_xp')) || 0,
        theme: localStorage.getItem('d_theme') || 'classic'
    };

    window.onload = function() {
        document.getElementById('nick-input').value = state.nick;
        document.getElementById('theme-select').value = state.theme;
        changeTheme(state.theme);
        updateUI();
        
        // Запускаем обновление данных каждые 3 секунды
        setInterval(() => {
            fetchData('chat', renderChat);
            fetchData('objects', renderObjects);
        }, 3000);
    };

    function route(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function changeTheme(t) {
        state.theme = t;
        document.body.className = t;
        localStorage.setItem('d_theme', t);
    }

    function saveNick() {
        state.nick = document.getElementById('nick-input').value;
        localStorage.setItem('d_nick', state.nick);
    }

    function updateUI() {
        document.getElementById('lvl').innerText = Math.floor(state.xp / 100) + 1;
        document.getElementById('xp').innerText = state.xp % 100;
        document.getElementById('xp-fill').style.width = (state.xp % 100) + '%';
        localStorage.setItem('d_xp', state.xp);
    }

    // РАБОТА С СЕРВЕРОМ
    async function postData(type, data) {
        const formData = new FormData();
        formData.append('type', type);
        formData.append('data', JSON.stringify(data));
        await fetch('server.php', { method: 'POST', body: formData });
    }

    async function fetchData(type, callback) {
        const res = await fetch('server.php?type=' + type);
        const data = await res.json();
        callback(data);
    }

    // ЧАТ
    function sendMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        const msg = { author: state.nick, text: input.value, time: new Date().toLocaleTimeString() };
        postData('chat', msg).then(() => fetchData('chat', renderChat));
        input.value = '';
        state.xp += 10; updateUI();
    }

    function renderChat(data) {
        const box = document.getElementById('chat-box');
        box.innerHTML = data.map(m => `<div class="msg"><small>${m.time}</small> <b>${m.author}:</b> ${m.text}</div>`).join('');
    }

    // ОБЪЕКТЫ
    function saveObject() {
        const obj = {
            title: document.getElementById('obj-title').value,
            coords: document.getElementById('obj-coords').value || "ЗАСЕКРЕЧЕНО",
            desc: document.getElementById('obj-desc').value,
            author: state.nick
        };
        if(!obj.title || !obj.desc) return alert("Заполни поля!");
        postData('objects', obj).then(() => fetchData('objects', renderObjects));
        state.xp += 50; updateUI();
        document.getElementById('obj-title').value = '';
        document.getElementById('obj-desc').value = '';
    }

    function renderObjects(data) {
        document.getElementById('archive-list').innerHTML = data.reverse().map(o => `
            <div class="box">
                <strong>${o.title}</strong> [${o.coords}]<br><p>${o.desc}</p><small>От: ${o.author}</small>
            </div>
        `).join('');
    }
</script>
</body>
</html>
