<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DIGGER NET | STABLE v14</title>
    <script src="gun.js"></script>
    <style>
        :root { --bg: #000; --text: #0f0; --accent: #0f0; }
        body.old { --bg: #000; --text: #ffcc00; --accent: #ffcc00; }
        body.boykisser { --bg: #fff; --text: #ff69b4; --accent: #ffb6c1; }
        body.pnv { --bg: #000d00; --text: #00ff00; --accent: #004400; }

        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; margin: 0; transition: 0.3s; }
        .nav { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; gap: 15px; overflow-x: auto; }
        .nav a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .nav a:hover { background: var(--accent); color: var(--bg); }
        
        .page { display: none; max-width: 850px; margin: 0 auto; }
        .active { display: block; }

        input, textarea, select { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--accent); 
            color: var(--text); padding: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        button { 
            background: var(--accent); color: var(--bg); border: none; 
            padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase;
        }

        .box { border: 1px solid var(--accent); padding: 15px; margin-top: 15px; background: rgba(128,128,128,0.05); }
        .msg-item { border-left: 2px solid var(--accent); padding: 5px 10px; margin-bottom: 8px; }
        
        .xp-bar { width: 100%; height: 12px; border: 1px solid var(--accent); margin-top: 10px; }
        #xp-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        #net-info { font-size: 0.7em; text-align: right; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body class="classic">

<div id="net-info">NETWORK: <span id="net-status" style="color: yellow;">CONNECTING...</span></div>

<div class="nav">
    <a onclick="route('archive')">/Архив</a>
    <a onclick="route('forum')">/Форум</a>
    <a onclick="route('profile')">/Профиль</a>
    <a onclick="route('settings')">/Настройки</a>
</div>

<div id="archive" class="page active">
    <h2>[ РЕЕСТР ОБЪЕКТОВ ]</h2>
    <div class="box">
        <input type="text" id="obj-title" placeholder="Название">
        <input type="text" id="obj-coords" placeholder="Координаты">
        <textarea id="obj-desc" rows="3" placeholder="Описание..."></textarea>
        <button onclick="saveObject()">СОХРАНИТЬ (+50 XP)</button>
    </div>
    <div id="archive-list"></div>
</div>

<div id="forum" class="page">
    <h2>[ КАНАЛ СВЯЗИ ]</h2>
    <div id="chat-box" style="height: 400px; overflow-y: auto; border: 1px solid var(--accent); padding: 15px; margin-bottom: 10px;"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="chat-msg" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="width: 100px;">SEND</button>
    </div>
</div>

<div id="profile" class="page">
    <h2>[ ДОСЬЕ ]</h2>
    <input type="text" id="nick-input" onchange="saveNick()" maxlength="15">
    <div class="box">
        <p>УРОВЕНЬ: <span id="lvl-val">1</span> | ОПЫТ: <span id="xp-val">0</span> / 100</p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>
</div>

<div id="settings" class="page">
    <h2>[ ТЕМЫ ]</h2>
    <select id="theme-select" onchange="setTheme(this.value)">
        <option value="classic">Classic Green</option>
        <option value="old">Old Terminal</option>
        <option value="boykisser">Boykisser:3</option>
        <option value="pnv">Режим ПНВ</option>
    </select>
</div>

<script>
    // --- НАСТРОЙКИ СЕТИ ---
    // Используем только полные рабочие адреса
    const peers = [
        'https://herokuapp.com',
        'https://herokuapp.com',
        'https://wall.org'
    ];

    let gun, db;
    
    // Инициализация
    if (typeof Gun !== 'undefined') {
        gun = Gun({ peers: peers, localStorage: true });
        db = gun.get('digger_network_stable_v14'); // Единый ключ версии
        
        // Отслеживание реального подключения
        gun.on('hi', peer => {
            document.getElementById('net-status').innerText = 'ONLINE';
            document.getElementById('net-status').style.color = 'var(--accent)';
        });
    }

    let state = {
        nick: localStorage.getItem('d_nick') || 'Digger' + Math.floor(Math.random()*999),
        xp: parseInt(localStorage.getItem('d_xp')) || 0,
        theme: localStorage.getItem('d_theme') || 'classic'
    };

    // --- ФУНКЦИИ ИНТЕРФЕЙСА ---
    window.route = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.setTheme = (t) => {
        state.theme = t;
        document.body.className = (t === 'classic' ? '' : t);
        localStorage.setItem('d_theme', t);
    };

    window.saveNick = () => {
        state.nick = document.getElementById('nick-input').value || 'Digger';
        localStorage.setItem('d_nick', state.nick);
    };

    function updateUI() {
        document.getElementById('lvl-val').innerText = Math.floor(state.xp / 100) + 1;
        document.getElementById('xp-val').innerText = state.xp % 100;
        document.getElementById('xp-fill').style.width = (state.xp % 100) + '%';
        localStorage.setItem('d_xp', state.xp);
    }

    window.onload = () => {
        document.getElementById('nick-input').value = state.nick;
        document.getElementById('theme-select').value = state.theme;
        setTheme(state.theme);
        updateUI();

        if (db) {
            db.get('chat').map().on((data, id) => {
                if(!data || !data.text || document.getElementById('msg-'+id)) return;
                const div = document.createElement('div');
                div.id = 'msg-'+id; div.className = 'msg-item';
                div.innerHTML = `<b>${data.author}:</b> ${data.text}`;
                document.getElementById('chat-box').appendChild(div);
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            });

            db.get('objects').map().on((data, id) => {
                if(!data || !data.title || document.getElementById('obj-'+id)) return;
                const div = document.createElement('div');
                div.id = 'obj-'+id; div.className = 'box';
                div.innerHTML = `<strong>${data.title}</strong> [${data.coords}]<p>${data.desc}</p><small>От: ${data.author}</small>`;
                document.getElementById('archive-list').prepend(div);
            });
        }
    };

    window.sendChat = () => {
        const input = document.getElementById('chat-msg');
        if(!input.value.trim() || !db) return;
        db.get('chat').set({ author: state.nick, text: input.value, time: Date.now() });
        input.value = '';
        state.xp += 10; updateUI();
    };

    window.saveObject = () => {
        const t = document.getElementById('obj-title').value;
        const d = document.getElementById('obj-desc').value;
        const c = document.getElementById('obj-coords').value || "NONE";
        if(!t || !d || !db) return alert("Заполни данные!");
        db.get('objects').set({ title: t, desc: d, coords: c, author: state.nick, time: Date.now() });
        state.xp += 50; updateUI();
        document.getElementById('obj-title').value = '';
        document.getElementById('obj-desc').value = '';
    };
</script>
</body>
</html>
