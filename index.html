<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DIGGER NET | FINAL CORE</title>
    <!-- Подключаем твой скачанный локальный файл -->
    <script src="gun.js"></script>
    <style>
        :root { --bg: #000; --text: #0f0; --accent: #0f0; }
        
        /* Темы оформления */
        body.old { --bg: #000; --text: #ffcc00; --accent: #ffcc00; }
        body.boykisser { --bg: #fff; --text: #ff69b4; --accent: #ffb6c1; }
        body.pnv { --bg: #000d00; --text: #00ff00; --accent: #004400; }

        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; margin: 0; transition: 0.3s; }
        
        .nav { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; gap: 15px; overflow-x: auto; }
        .nav a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .nav a:hover { background: var(--accent); color: var(--bg); }
        
        .page { display: none; max-width: 800px; margin: 0 auto; }
        .active { display: block; }

        input, textarea, select { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--accent); 
            color: var(--text); padding: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        button { 
            background: var(--accent); color: var(--bg); border: none; 
            padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase;
        }
        button:hover { opacity: 0.8; }

        .box { border: 1px solid var(--accent); padding: 15px; margin-top: 15px; background: rgba(255,255,255,0.02); }
        .msg-item { border-left: 3px solid var(--accent); padding: 5px 10px; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
        
        .xp-bar { width: 100%; height: 15px; border: 1px solid var(--accent); margin-top: 10px; background: #111; }
        #xp-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s; }

        h2 { border-bottom: 1px solid var(--accent); padding-bottom: 5px; text-transform: uppercase; }
        small { opacity: 0.7; }
    </style>
</head>
<body class="classic">

<div class="nav">
    <a onclick="route('archive')">/Архив_Объектов</a>
    <a onclick="route('forum')">/Форум_Связь</a>
    <a onclick="route('profile')">/Профиль</a>
    <a onclick="route('settings')">/Настройки</a>
</div>

<!-- АРХИВ (Объекты с координатами) -->
<div id="archive" class="page active">
    <h2>[ РЕГИСТРАЦИЯ ОБЪЕКТА ]</h2>
    <div class="box">
        <input type="text" id="obj-title" placeholder="Название (например: Бункер-42)">
        <input type="text" id="obj-coords" placeholder="Координаты (необязательно)">
        <textarea id="obj-desc" rows="3" placeholder="Описание объекта..."></textarea>
        <button onclick="addArchive()">ВНЕСТИ В АРХИВ (+50 XP)</button>
    </div>
    <div id="archive-list" style="margin-top: 20px;"></div>
</div>

<!-- ФОРУМ (Просто сообщения) -->
<div id="forum" class="page">
    <h2>[ КАНАЛ СВЯЗИ ]</h2>
    <div id="chat-box" style="height: 400px; overflow-y: auto; border: 1px solid var(--accent); padding: 15px; margin-bottom: 10px;"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="forum-msg" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendChat()">
        <button style="width: auto;" onclick="sendChat()">SEND</button>
    </div>
</div>

<!-- ПРОФИЛЬ -->
<div id="profile" class="page">
    <h2>[ ЛИЧНОЕ ДЕЛО ]</h2>
    <label>ВАШ ПОЗЫВНОЙ:</label>
    <input type="text" id="nick-input" onchange="saveNick()" placeholder="Введите ник">
    <div class="box">
        <p>СТАТУС: <span id="rank">НОВИЧОК</span></p>
        <p>УРОВЕНЬ: <span id="lvl">1</span> | ОПЫТ: <span id="xp-val">0</span> / 100</p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>
</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="page">
    <h2>[ КОНФИГУРАЦИЯ ]</h2>
    <label>ВЫБОР ТЕМЫ:</label>
    <select id="theme-sel" onchange="setTheme(this.value)">
        <option value="classic">Classic Green</option>
        <option value="old">Old Terminal (Yellow)</option>
        <option value="boykisser">Boykisser:3 (Pink)</option>
        <option value="pnv">Режим ПНВ (Dark Green)</option>
    </select>
</div>

<script>
    // 1. Инициализация Gun (если файл gun.js загружен)
    let gun, db;
    if (typeof Gun !== 'undefined') {
        gun = Gun(['https://herokuapp.com', 'https://herokuapp.com']);
        db = gun.get('digger_network_global_v5');
    } else {
        alert("Ошибка: файл gun.js не найден в папке сайта!");
    }

    let state = {
        nick: localStorage.getItem('d_nick') || 'Digger' + Math.floor(Math.random()*999),
        xp: parseInt(localStorage.getItem('d_xp')) || 0,
        theme: localStorage.getItem('d_theme') || 'classic'
    };

    window.onload = () => {
        document.getElementById('nick-input').value = state.nick;
        document.getElementById('theme-sel').value = state.theme;
        setTheme(state.theme);
        updateUI();

        if (db) {
            // Загрузка объектов
            db.get('objects').map().on((data, id) => {
                if(!data || document.getElementById('obj-'+id)) return;
                const div = document.createElement('div');
                div.id = 'obj-'+id;
                div.className = 'box';
                div.innerHTML = `<strong>${data.title}</strong> <span style="color:red">[${data.coords}]</span><p>${data.desc}</p><small>Автор: ${data.author}</small>`;
                document.getElementById('archive-list').prepend(div);
            });

            // Загрузка чата
            db.get('chat').map().on((data, id) => {
                if(!data || document.getElementById('msg-'+id)) return;
                const div = document.createElement('div');
                div.id = 'msg-'+id;
                div.className = 'msg-item';
                div.innerHTML = `<b>${data.author}:</b> ${data.text}`;
                const box = document.getElementById('chat-box');
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }
    };

    // Навигация
    window.route = (p) => {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p).classList.add('active');
    };

    // Темы
    window.setTheme = (t) => {
        state.theme = t;
        document.body.className = t === 'classic' ? '' : t;
        localStorage.setItem('d_theme', t);
    };

    // Профиль
    window.saveNick = () => {
        state.nick = document.getElementById('nick-input').value || 'Anonymous';
        localStorage.setItem('d_nick', state.nick);
    };

    function updateUI() {
        const lvl = Math.floor(state.xp / 100) + 1;
        const prog = state.xp % 100;
        const ranks = ["КРЫСА", "НОВИЧОК", "СТАЛКЕР", "ПРОВОДНИК", "ЛЕГЕНДА"];
        
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('xp-val').innerText = prog;
        document.getElementById('xp-fill').style.width = prog + '%';
        document.getElementById('rank').innerText = ranks[Math.min(lvl-1, 4)];
        localStorage.setItem('d_xp', state.xp);
    }

    // Отправка в Архив (Объекты)
    window.addArchive = () => {
        const title = document.getElementById('obj-title').value;
        const desc = document.getElementById('obj-desc').value;
        const coords = document.getElementById('obj-coords').value || "ЗАСЕКРЕЧЕНО";
        
        if(!title || !desc) return alert("Введите название и описание!");
        
        db.get('objects').set({ title, desc, coords, author: state.nick });
        state.xp += 50;
        updateUI();
        
        document.getElementById('obj-title').value = '';
        document.getElementById('obj-desc').value = '';
        document.getElementById('obj-coords').value = '';
    };

    // Отправка в Форум (Сообщения)
    window.sendChat = () => {
        const msg = document.getElementById('forum-msg').value;
        if(!msg.trim()) return;
        
        db.get('chat').set({ author: state.nick, text: msg, time: Date.now() });
        state.xp += 10;
        updateUI();
        document.getElementById('forum-msg').value = '';
    };
</script>
</body>
</html>
