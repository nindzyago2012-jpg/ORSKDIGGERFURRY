<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DIGGER NET | GITHUB EDITION</title>
    <!-- Пытаемся загрузить Gun еще раз, но теперь с защитой -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --bg: #000; --text: #0f0; --accent: #0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .nav { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .nav a:hover { background: var(--accent); color: var(--bg); }
        .page { display: none; }
        .active { display: block; }
        input, textarea, select { background: #000; border: 1px solid var(--accent); color: var(--text); padding: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .box { border: 1px solid var(--accent); padding: 15px; margin-top: 10px; background: rgba(0,255,0,0.05); }
        .msg { border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        .xp-bar { width: 100%; height: 10px; border: 1px solid var(--accent); margin-top: 5px; }
        #xp-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }
        body.old { --bg: #000; --text: #ffcc00; --accent: #ffcc00; }
        body.boykisser { --bg: #fff; --text: #ff69b4; --accent: #ffb6c1; }
        body.pnv { --bg: #001a00; --text: #00ff00; --accent: #005500; }
    </style>
</head>
<body>

<div id="status" style="background: red; color: #000; text-align: center; display: none; font-weight: bold;">
    ОШИБКА: БИБЛИОТЕКА БАЗЫ ДАННЫХ НЕ ЗАГРУЖЕНА
</div>

<div class="nav">
    <a onclick="route('archive')">/Архив</a>
    <a onclick="route('forum')">/Форум</a>
    <a onclick="route('profile')">/Профиль</a>
    <a onclick="route('settings')">/Настройки</a>
</div>

<div id="archive" class="page active">
    <h2>[ ОБЪЕКТЫ ]</h2>
    <input type="text" id="obj-title" placeholder="Название объекта">
    <input type="text" id="obj-coords" placeholder="Координаты">
    <textarea id="obj-desc" placeholder="Описание..."></textarea>
    <button onclick="saveObject()">ОПУБЛИКОВАТЬ В СЕТЬ (+50 XP)</button>
    <div id="archive-list"></div>
</div>

<div id="forum" class="page">
    <h2>[ ОБЩИЙ ЧАТ ]</h2>
    <div id="chat-box" style="height: 300px; overflow-y: auto; border: 1px solid var(--accent); padding: 10px; margin-bottom: 10px;"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="chat-input" placeholder="Ваше сообщение...">
        <button onclick="sendChat()" style="width: auto;">SEND</button>
    </div>
</div>

<div id="profile" class="page">
    <h2>[ ДОСЬЕ ]</h2>
    <input type="text" id="nick-input" onchange="saveNick()" placeholder="Никнейм">
    <div class="box">
        <p>УРОВЕНЬ: <span id="lvl">1</span> | ОПЫТ: <span id="xp">0</span></p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>
</div>

<div id="settings" class="page">
    <h2>[ СИСТЕМА ]</h2>
    <select onchange="changeTheme(this.value)" id="theme-select">
        <option value="classic">Classic</option>
        <option value="old">Old School</option>
        <option value="boykisser">Boykisser:3</option>
        <option value="pnv">ПНВ</option>
    </select>
</div>

<script>
    let gun, db;
    let state = {
        nick: localStorage.getItem('d_nick') || 'Digger' + Math.floor(Math.random()*99),
        xp: parseInt(localStorage.getItem('d_xp')) || 0,
        theme: localStorage.getItem('d_theme') || 'classic'
    };

    window.onload = function() {
        if (typeof Gun === 'undefined') {
            document.getElementById('status').style.display = 'block';
            return;
        }

        // Подключаемся к публичным узлам Gun, чтобы данные летали между пользователями
        gun = Gun([
            'https://herokuapp.com',
            'https://herokuapp.com'
        ]);
        db = gun.get('digger_fury_network_v1');

        document.getElementById('nick-input').value = state.nick;
        document.getElementById('theme-select').value = state.theme;
        changeTheme(state.theme);
        renderProfile();

        // Слушаем чат
        db.get('chat').map().on((data, id) => {
            if(!data || document.getElementById('msg-'+id)) return;
            const msgDiv = document.createElement('div');
            msgDiv.id = 'msg-'+id;
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<b>${data.author}:</b> ${data.text}`;
            const box = document.getElementById('chat-box');
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        });

        // Слушаем архив
        db.get('objects').map().on((data, id) => {
            if(!data || document.getElementById('obj-'+id)) return;
            const objDiv = document.createElement('div');
            objDiv.id = 'obj-'+id;
            objDiv.className = 'box';
            objDiv.innerHTML = `<strong>${data.title}</strong> [${data.coords}]<br>${data.desc}`;
            document.getElementById('archive-list').prepend(objDiv);
        });
    };

    window.route = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.changeTheme = (t) => {
        state.theme = t;
        document.body.className = t;
        localStorage.setItem('d_theme', t);
    };

    window.saveNick = () => {
        state.nick = document.getElementById('nick-input').value;
        localStorage.setItem('d_nick', state.nick);
    };

    function renderProfile() {
        document.getElementById('lvl').innerText = Math.floor(state.xp / 100) + 1;
        document.getElementById('xp').innerText = state.xp % 100;
        document.getElementById('xp-fill').style.width = (state.xp % 100) + '%';
        localStorage.setItem('d_xp', state.xp);
    }

    window.sendChat = () => {
        const val = document.getElementById('chat-input').value;
        if(!val || !db) return;
        db.get('chat').set({ author: state.nick, text: val, time: Date.now() });
        document.getElementById('chat-input').value = '';
        state.xp += 10; renderProfile();
    };

    window.saveObject = () => {
        const title = document.getElementById('obj-title').value;
        const desc = document.getElementById('obj-desc').value;
        const coords = document.getElementById('obj-coords').value || "NONE";
        if(!title || !desc || !db) return alert("Заполни поля!");
        db.get('objects').set({ title, desc, coords, author: state.nick });
        state.xp += 50; renderProfile();
        document.getElementById('obj-title').value = '';
        document.getElementById('obj-desc').value = '';
    };
</script>
</body>
</html>
