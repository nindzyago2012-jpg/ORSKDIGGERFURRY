<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orsk Digger Project | Swag Team (Standalone)</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <style>
        :root { --y: #ffcc00; --b: #0a0a0a; --g: #1a1a1a; --text: #e0e0e0; --accent: #ffcc00; }
        [data-theme="bw"] { --y: #ffffff; --b: #000000; --g: #111111; --text: #ffffff; --accent: #888888; }
        [data-theme="boykisser"] { --y: #ff80ab; --b: #fff0f6; --g: #ffffff; --text: #880e4f; --accent: #f06292; }

        body { background: var(--b); color: var(--text); font-family: 'Courier New', monospace; margin: 0; transition: 0.3s; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1200px; width: 90%; margin: 0 auto; padding: 20px 0; flex: 1; }
        
        header { background: var(--y); color: var(--b); padding: 50px 0; text-align: center; border-bottom: 8px solid var(--accent); }
        .logo-img { width: 250px; height: 250px; border-radius: 50%; border: 8px solid var(--b); margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 40px rgba(0,0,0,0.6); cursor: pointer; transition: transform 0.1s; }
        .logo-img:active { transform: scale(1.1); }
        header h1 { margin: 0; font-size: 38px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; }
        
        .lvl-box { margin-top: 25px; background: rgba(0,0,0,0.5); display: inline-block; padding: 15px 30px; border: 2px solid var(--b); min-width: 320px; }
        .xp-bar { width: 100%; height: 12px; background: #333; display: block; border: 1px solid var(--b); margin-top: 10px; position: relative; }
        #xp-fill { height: 100%; background: var(--b); width: 0%; transition: 1s ease-in-out; }

        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 30px 0; }
        nav button, nav select { background: var(--g); border: 2px solid var(--y); color: var(--y); padding: 12px 18px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s; }
        nav button.active { background: var(--y); color: var(--b); }

        .sub-nav { display: flex; gap: 15px; margin-bottom: 25px; }
        .sub-nav button { flex: 1; padding: 18px; background: var(--g); color: var(--y); border: 3px solid var(--y); box-shadow: 5px 5px 0px var(--y); font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        .sub-nav button.active { background: var(--y); color: var(--b); transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--y); }

        .page { display: none; min-height: 600px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* КАРТА */
        #map-window { width: 100%; height: 600px; border: 4px solid var(--y); background: #000; overflow: auto; position: relative; }
        #map-area { position: relative; display: inline-block; min-width: 100%; transition: width 0.2s; }
        #map-img { display: block; width: 100%; cursor: crosshair; }
        .marker { position: absolute; width: 22px; height: 22px; background: var(--y); border: 2px solid #000; transform: translate(-50%, -50%) rotate(45deg); cursor: pointer; z-index: 10; box-shadow: 0 0 10px #000; }

        .form-section { background: var(--g); padding: 30px; border: 3px solid var(--y); margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: var(--b); border: 1px solid var(--y); color: var(--text); font-family: inherit; box-sizing: border-box; font-size: 16px; }
        .btn-send { background: var(--y); color: var(--b); border: none; padding: 20px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 18px; border: 2px solid var(--b); }

        .post-card { background: var(--g); padding: 25px; margin-bottom: 20px; border-left: 10px solid var(--y); position: relative; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .btn-jump { background: var(--y); color: #000; border: none; padding: 10px; font-weight: 900; cursor: pointer; margin-top: 15px; display: inline-block; font-size: 12px; }
        
        footer { background: var(--b); color: var(--y); text-align: center; padding: 35px; border-top: 5px solid var(--y); margin-top: 50px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <img src="assets/logo.png" id="main-logo" class="logo-img" onclick="playMeow()">
    <h1>ORSK DIGGER PROJECT</h1>
    <div class="lvl-box">
        <span id="lvl-text" style="font-size: 18px; font-weight: bold;">Статус: Школьник</span>
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <div id="xp-text" style="font-size: 13px; font-weight: bold; margin-top: 5px;">0 / 50 XP</div>
    </div>
</header>

<div class="container">
    <nav>
        <button onclick="switchTab('map-page')" id="nav-map-page" class="active">КАРТА</button>
        <button onclick="switchTab('blog-page')" id="nav-blog-page">АРХИВ</button>
        <button onclick="switchTab('forum-page')" id="nav-forum-page">ФОРУМ</button>
        <button onclick="switchTab('wiki-page')" id="nav-wiki-page">ВИКИ</button>
        <button onclick="renderProfile(); switchTab('profile-page')" id="nav-profile-page">ПРОФИЛЬ</button>
        <select onchange="changeTheme(this.value)">
            <option value="default">🌐 СТАНДАРТ</option>
            <option value="bw">☢ МОНОХРОМ</option>
            <option value="boykisser">✿ BOYKISSER :3</option>
        </select>
    </nav>

    <!-- КАРТА -->
    <div id="map-page" class="page active">
        <div class="sub-nav">
            <button onclick="setMap('maposn.jpg')" id="m-btn-osn" class="active">ОСНОВНАЯ</button>
            <button onclick="setMap('maplenkom.png')" id="m-btn-lenkom">ЛЕНКОМ</button>
        </div>
        <div style="margin-bottom: 10px; display: flex; align-items: center; gap: 15px;">
            <span style="color:var(--y); font-weight:bold;">ЗУМ:</span>
            <input type="range" min="100" max="500" value="100" oninput="zoomMap(this.value)" style="flex:1;">
        </div>
        <div id="map-window">
            <div id="map-area">
                <img src="assets/maposn.jpg" id="map-img" onclick="addMarker(event)">
                <div id="markers-layer" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;"></div>
            </div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profile-page" class="page">
        <div class="form-section">
            <h2 style="color: var(--y); border-bottom: 2px solid var(--y); margin-top:0;">ЛИЧНОЕ ДЕЛО ДИГГЕРА</h2>
            <div id="profile-stats" style="font-size: 18px; line-height: 2;"></div>
            <button class="btn-send" style="margin-top: 20px; width: auto; padding: 10px 25px;" onclick="switchTab('map-page')">НАЗАД</button>
            <button class="btn-send" style="margin-top: 20px; width: auto; background: #500; color: #fff;" onclick="resetData()">СБРОСИТЬ ВСЁ</button>
        </div>
    </div>

    <!-- АРХИВ -->
    <div id="blog-page" class="page">
        <div class="form-section">
            <input type="text" id="t-title" placeholder="НАЗВАНИЕ ОБЪЕКТА">
            <textarea id="t-body" rows="3" placeholder="ОТЧЕТ..."></textarea>
            <button class="btn-send" onclick="sendPost()">ВНЕСТИ В АРХИВ (+10 XP)</button>
        </div>
        <div id="feed"></div>
    </div>

    <!-- ФОРУМ -->
    <div id="forum-page" class="page">
        <div class="sub-nav">
            <button onclick="setForum('flud')" id="f-btn-flud" class="active">ФЛУДИЛКА</button>
            <button onclick="setForum('zalaz')" id="f-btn-zalaz">ОБСУЖДЕНИЕ</button>
        </div>
        <div class="form-section">
            <textarea id="f-msg" rows="2" placeholder="СООБЩЕНИЕ..."></textarea>
            <button class="btn-send" onclick="sendForum()">ОТПРАВИТЬ (+5 XP)</button>
        </div>
        <div id="forum-feed"></div>
    </div>

    <!-- ВИКИ -->
    <div id="wiki-page" class="page">
        <div class="form-section">
            <input type="text" id="w-obj" placeholder="ИМЯ ОБЪЕКТА">
            <textarea id="w-desc" rows="4" placeholder="ИСТОРИЯ, СОСТОЯНИЕ..."></textarea>
            <button class="btn-send" onclick="saveWiki()">ОБНОВИТЬ ВИКИ (+15 XP)</button>
        </div>
        <div id="wiki-feed"></div>
    </div>
</div>

<footer>КТО ЗАДУДОСИТ ЭТОТ САЙТ ТОТ ПИДОРАС</footer>

<script>
    let userNick, userXP = 0, currentMapFile = 'maposn.jpg', currentForumCat = 'flud', lastAction = 0;
    let tempCoord = null;

    window.onload = function() {
        userNick = localStorage.getItem('digger_nick');
        if (!userNick) {
            let n = prompt("ТВОЙ ПОЗЫВНОЙ:");
            if (n) { 
                localStorage.setItem('digger_nick', n.trim()); 
                localStorage.setItem('reg_date', new Date().toLocaleDateString());
                localStorage.setItem('digger_xp', '0');
                location.reload(); 
            }
        } else { initApp(); }
    };

    function initApp() {
        setMap(currentMapFile);
        loadBlog(); loadForum('flud'); loadWiki();
        updateLVLUI();
        changeTheme(localStorage.getItem('site_theme') || 'default');
    }

    function checkCD() {
        const now = Date.now();
        if (now - lastAction < 5000) { alert(`☢ ПАУЗА ${Math.ceil((5000-(now-lastAction))/1000)} сек!`); return false; }
        lastAction = now; return true;
    }

    // --- ВСПОМОГАТЕЛЬНЫЕ ---
    function getStore(k) { return JSON.parse(localStorage.getItem(k) || "[]"); }
    function setStore(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
    function addXP(v) { 
        userXP = parseInt(localStorage.getItem('digger_xp') || "0") + v;
        localStorage.setItem('digger_xp', userXP);
        updateLVLUI();
    }

    function updateLVLUI() {
        userXP = parseInt(localStorage.getItem('digger_xp') || "0");
        const ranks = [
            {name: "Школьник", min: 0, max: 50},
            {name: "Дренажная Крыса", min: 50, max: 150},
            {name: "Лазальщик", min: 150, max: 400},
            {name: "Диггер", min: 400, max: 1000},
            {name: "Крутэлык", min: 1000, max: 1000}
        ];
        let r = ranks[0];
        for(let i=ranks.length-1; i>=0; i--) { if(userXP >= ranks[i].min) { r = ranks[i]; break; } }

        document.getElementById('lvl-text').innerText = "Статус: " + r.name;
        if(r.name === "Крутэлык") {
            document.getElementById('xp-text').innerText = "МАКСИМУМ ДОСТИГНУТ";
            document.getElementById('xp-fill').style.width = "100%";
        } else {
            let progress = ((userXP - r.min) / (r.max - r.min)) * 100;
            document.getElementById('xp-text').innerText = `${userXP - r.min} / ${r.max - r.min} XP`;
            document.getElementById('xp-fill').style.width = progress + "%";
        }
    }

    // --- КАРТА ---
    function setMap(f) {
        currentMapFile = f;
        document.getElementById('map-img').src = 'assets/' + f;
        document.getElementById('m-btn-osn').className = f.includes('osn') ? 'active' : '';
        document.getElementById('m-btn-lenkom').className = f.includes('lenkom') ? 'active' : '';
        renderMarkers();
    }

    function zoomMap(v) { document.getElementById('map-area').style.width = v + "%"; }

    function addMarker(e) {
        if(!checkCD()) return;
        const rect = e.target.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100, y = ((e.clientY - rect.top) / rect.height) * 100;
        const note = prompt("Название объекта:");
        if(note) {
            let m = getStore('markers_' + currentMapFile);
            m.push({ x, y, note, id: Date.now() });
            setStore('markers_' + currentMapFile, m);
            addXP(5); renderMarkers();
            if(confirm("Создать статью в Вики для этого объекта?")) {
                tempCoord = { x, y, f: currentMapFile };
                document.getElementById('w-obj').value = note;
                switchTab('wiki-page');
            }
        }
    }

    function renderMarkers() {
        const layer = document.getElementById('markers-layer'); layer.innerHTML = '';
        getStore('markers_' + currentMapFile).forEach(m => {
            const el = document.createElement('div'); el.className = 'marker'; el.style.left = m.x + "%"; el.style.top = m.y + "%";
            el.onclick = (e) => { e.stopPropagation(); if(confirm("Удалить метку " + m.note + "?")) {
                setStore('markers_'+currentMapFile, getStore('markers_'+currentMapFile).filter(i => i.id !== m.id)); renderMarkers();
            }};
            layer.appendChild(el);
        });
    }

    // --- ПРОФИЛЬ ---
    function renderProfile() {
        const stats = {
            posts: getStore('posts').length,
            forum: getStore('forum_flud').length + getStore('forum_zalaz').length,
            wiki: getStore('wiki').length,
            date: localStorage.getItem('reg_date') || "Давно"
        };
        document.getElementById('profile-stats').innerHTML = `
            <strong>НИК:</strong> ${userNick}<br>
            <strong>ОБЩИЙ ОПЫТ:</strong> ${userXP} XP<br>
            <strong>В КОМАНДЕ С:</strong> ${stats.date}<br>
            <strong>ОТЧЕТОВ:</strong> ${stats.posts}<br>
            <strong>СООБЩЕНИЙ:</strong> ${stats.forum}<br>
            <strong>СТАТЕЙ ВИКИ:</strong> ${stats.wiki}<br>
            <strong>СТАТУС:</strong> <span style="color:#0f0">ОНЛАЙН (ЛОКАЛЬНО)</span>
        `;
    }

    // --- СЕКЦИИ ---
    function sendPost() {
        const t = document.getElementById('t-title').value, b = document.getElementById('t-body').value;
        if(t && b && checkCD()) {
            let p = getStore('posts'); p.unshift({t, b, d: new Date().toLocaleString()});
            setStore('posts', p); addXP(10); loadBlog();
        }
    }
    function loadBlog() {
        const f = document.getElementById('feed'); f.innerHTML = '';
        getStore('posts').forEach(p => { f.innerHTML += `<div class="post-card"><h2>${p.t}</h2><p>${p.b}</p><small>${p.d}</small></div>`; });
    }

    function setForum(c) { currentForumCat = c; loadForum(c); }
    function loadForum(c) {
        document.getElementById('f-btn-flud').className = c==='flud'?'active':'';
        document.getElementById('f-btn-zalaz').className = c==='zalaz'?'active':'';
        const f = document.getElementById('forum-feed'); f.innerHTML = '';
        getStore('forum_'+c).forEach(m => { f.innerHTML += `<div style="padding:10px; border-bottom:1px solid var(--y)"><b>${userNick}:</b> ${m.msg}</div>`; });
    }
    function sendForum() {
        const m = document.getElementById('f-msg').value;
        if(m && checkCD()) {
            let ms = getStore('forum_'+currentForumCat); ms.unshift({msg:m});
            setStore('forum_'+currentForumCat, ms); addXP(5); loadForum(currentForumCat);
            document.getElementById('f-msg').value = '';
        }
    }

    function saveWiki() {
        const o = document.getElementById('w-obj').value, d = document.getElementById('w-desc').value;
        if(o && d && checkCD()) {
            let w = getStore('wiki');
            const data = { o, d, id: Date.now() };
            if(tempCoord) { data.mX = tempCoord.x; data.mY = tempCoord.y; data.mF = tempCoord.f; }
            w.push(data); setStore('wiki', w); addXP(15); loadWiki();
            tempCoord = null; document.getElementById('w-obj').value = ''; document.getElementById('w-desc').value = '';
        }
    }
    function loadWiki() {
        const f = document.getElementById('wiki-feed'); f.innerHTML = '';
        getStore('wiki').forEach(w => {
            let btn = w.mF ? `<button class="btn-jump" onclick="jumpToMap('${w.mF}', ${w.mX}, ${w.mY})">📍 ПОКАЗАТЬ НА КАРТЕ</button>` : '';
            f.innerHTML += `<div class="post-card"><h2>${w.o}</h2><p>${w.d}</p>${btn}</div>`;
        });
    }

    function jumpToMap(f, x, y) {
        switchTab('map-page'); setMap(f);
        setTimeout(() => {
            const win = document.getElementById('map-window'); const img = document.getElementById('map-img');
            win.scrollLeft = (img.clientWidth * (x/100)) - (win.clientWidth/2);
            win.scrollTop = (img.clientHeight * (y/100)) - (win.clientHeight/2);
        }, 300);
    }

    // --- СИСТЕМНОЕ ---
    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
    }
    function playMeow() { new Audio('assets/meow.mp3').play().catch(()=>{}); }
    function changeTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('site_theme', t); }
    function resetData() { if(confirm("ЭТО УДАЛИТ ВСЕ ТВОИ ЗАПИСИ. УВЕРЕН?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
