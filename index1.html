<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orsk Digger Project</title>
    
    <!-- Стили Карты -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        :root { --y: #ffcc00; --b: #0a0a0a; --g: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--b); color: var(--text); font-family: 'Courier New', monospace; margin: 0; }
        .container { max-width: 1200px; width: 85%; margin: 0 auto; padding: 40px 0; }
        header { background: var(--y); color: var(--b); padding: 40px 0; text-align: center; border-bottom: 5px solid #333; }
        header h1 { margin: 0; font-size: 36px; letter-spacing: 5px; }
        nav { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        nav button { background: none; border: 2px solid var(--y); color: var(--y); padding: 12px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        nav button.active { background: var(--y); color: var(--b); }
        .page { display: none; }
        .page.active { display: block; }
        #map { height: 550px; width: 100%; border: 3px solid var(--y); background: #111; }
        .form-section { background: var(--g); padding: 30px; border-radius: 4px; margin-bottom: 40px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: var(--y); box-sizing: border-box; font-family: inherit; }
        .btn-send { background: var(--y); color: var(--b); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .post-card { background: var(--g); padding: 25px; margin-bottom: 25px; border-left: 5px solid var(--y); position: relative; }
        .post-card h2 { color: var(--y); margin-top: 0; padding-right: 100px; }
        .post-card .date { color: #666; font-size: 13px; margin-bottom: 10px; }
        .post-card p { white-space: pre-wrap; line-height: 1.5; }
        .post-card img { max-width: 100%; border: 1px solid #333; margin-top: 15px; display: block; }
        .btn-delete { position: absolute; top: 20px; right: 20px; background: #8b0000; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>ORSK DIGGER PROJECT</h1></header>

<div class="container">
    <nav>
        <button id="btn-map" class="active" onclick="switchTab('map-page')">Карта</button>
        <button id="btn-blog" onclick="switchTab('blog-page')">Записи</button>
    </nav>

    <div id="map-page" class="page active">
        <div id="map"></div>
        <p style="color:var(--y); text-align:center; margin-top:10px;">Кликни по карте, чтобы добавить метку объекта.</p>
    </div>

    <div id="blog-page" class="page">
        <div class="form-section">
            <h2 style="color:var(--y); margin:0;">Новый отчет</h2>
            <input type="text" id="t-title" placeholder="Объект">
            <textarea id="t-body" rows="4" placeholder="Текст отчета..."></textarea>
            <input type="text" id="t-img" placeholder="Ссылка на фото (необязательно)">
            <button class="btn-send" onclick="sendPost()">ОПУБЛИКОВАТЬ В АРХИВ</button>
        </div>
        <h2 style="color:var(--y); text-align: center; letter-spacing: 3px; margin-top: 50px;">АРХИВ ЗАПИСЕЙ</h2>
        <div id="feed"></div>
    </div>
</div>

<!-- ПОДКЛЮЧЕНИЕ БИБЛИОТЕК -->
<script src="https://www.gstatic.com"></script>
<script src="https://www.gstatic.com"></script>
<script src="https://unpkg.com"></script>

<script>
    // Глобальные переменные
    var database;
    var map;

    // 1. ФУНКЦИИ НАВИГАЦИИ И ПУБЛИКАЦИИ
    function switchTab(tabId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'map-page') {
            document.getElementById('btn-map').classList.add('active');
            if (map) setTimeout(() => map.invalidateSize(), 200);
        } else {
            document.getElementById('btn-blog').classList.add('active');
        }
    }

    function sendPost() {
        if (!database) return alert("База данных еще не готова!");
        const title = document.getElementById('t-title').value;
        const body = document.getElementById('t-body').value;
        const img = document.getElementById('t-img').value;
        const date = new Date().toLocaleString('ru-RU');

        if (!title || !body) return alert("Заполни заголовок и текст!");

        database.ref('posts').push({ title, body, img: img || "", date })
        .then(() => {
            document.getElementById('t-title').value = '';
            document.getElementById('t-body').value = '';
            document.getElementById('t-img').value = '';
        }).catch(e => console.error("Ошибка Firebase:", e));
    }

    function deletePost(id) {
        if(confirm("Удалить отчет из архива?")) {
            database.ref('posts').child(id).remove();
        }
    }

    // 2. ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ЗАГРУЗКИ СКРИПТОВ
    window.onload = function() {
        // Проверка наличия Firebase в системе
        if (typeof firebase === 'undefined') {
            alert("Ошибка загрузки Firebase. Проверьте интернет или VPN.");
            return;
        }

        // Инициализация Firebase
        const firebaseConfig = {
            databaseURL: "https://orskdigg-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();

        // Инициализация Карты
        map = L.map('map').setView([51.23, 58.47], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // Загрузка меток
        database.ref('markers').on('child_added', (snap) => {
            const d = snap.val();
            L.marker([d.lat, d.lng]).addTo(map).bindPopup(`<b>Объект:</b><br>${d.note}`);
        });

        map.on('click', (e) => {
            const note = prompt("Название объекта:");
            if (note) database.ref('markers').push({ lat: e.latlng.lat, lng: e.latlng.lng, note: note });
        });

        // Слушатель постов
        database.ref('posts').on('value', (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    const imgTag = (p.img && p.img.length > 5) ? `<img src="${p.img}" onerror="this.style.display='none'">` : '';
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <button class="btn-delete" onclick="deletePost('${key}')">УДАЛИТЬ</button>
                        <h2>${p.title}</h2>
                        <div class="date">${p.date}</div>
                        <p>${p.body}</p>
                        ${imgTag}
                    `;
                    feed.appendChild(card);
                });
            } else {
                feed.innerHTML = '<p style="text-align:center; color:#555;">АРХИВ ПУСТ</p>';
            }
        });
        
        // Финальный фикс размера карты
        setTimeout(() => map.invalidateSize(), 500);
    };
</script>
</body>
</html>
